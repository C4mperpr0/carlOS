# SpeedCrunch
windowrule = float, title:^(SpeedCrunch)$
windowrule = move 75% 65%, title:^(SpeedCrunch)$
windowrule = size 25% 35%, title:^(SpeedCrunch)$
windowrule = opacity 0.6, title:^(SpeedCrunch)$

# wdisplays
windowrule = float, title:^(wdisplays)$
windowrule = size 90% 90%, title:^(wdisplays)$
windowrule = center 1, title:^(wdisplays)$
windowrule = pin, title:^(wdisplays)$
windowrule = dimaround on, title:^(wdisplays)$

# volume control
windowrule = float, title:^(Volume Control)$
windowrule = move 30% 5%, title:^(Volume Control)$
windowrule = size 40% 40%, title:^(Volume Control)$
windowrule = opacity 0.8, title:^(Volume Control)$

# mn-connection-editor
windowrule = float, title:^(Network Connections)$
windowrule = move 30% 5%, title:^(Network Connections)$
windowrule = size 40% 40%, title:^(Network Connections)$
windowrule = opacity 0.8, title:^(Network Connections)$
